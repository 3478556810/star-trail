<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script>
  window.__APP_VERSION__ = '2.3';
</script>
  <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, orientation=landscape">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
  <title>星痕物语</title>
<style>
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-overflow-scrolling: none;
  }
  @media screen and (orientation: portrait) {
    html::before {
      content: "请旋转手机横屏游玩";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #1a1a2e;
      color: #c9a87b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-family: sans-serif;
      z-index: 99999;
    }
  }
</style>
<script>
  
  // 强制清除所有缓存并刷新到最新版本
  (function() {
    var currentVersion = window.__APP_VERSION__; // 每次部署新版本时修改这个数字
    var savedVersion = localStorage.getItem('app_version');
    if (currentVersion !== savedVersion) {
      localStorage.setItem('app_version', currentVersion);
      // 注销所有 Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var i = 0; i < registrations.length; i++) {
            registrations[i].unregister();
          }
        });
      }
      // 清除所有 Cache Storage
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var i = 0; i < names.length; i++) {
            caches.delete(names[i]);
          }
        });
      }
      // 强制刷新
      location.reload(true);
    }
  })();
</script>
</head>
<body>
  <div id="app"></div>
  <!-- Vite 入口，PWA 插件会自动注入 Service Worker -->
  <script type="module" src="/src/main.js"></script>
</body>
</html>
